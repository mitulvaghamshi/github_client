include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - lib/src/github_gql/__generated__/*.g.dart
    - lib/src/github_gql/__generated__/*.gql.dart
    - lib/src/github_gql_schema/__generated__/*.g.dart
    - lib/src/github_gql_schema/__generated__/*.gql.dart

linter:
  rules:
    - avoid_print
    - prefer_single_quotes
    - prefer_const_declarations
    - prefer_const_constructors
    - avoid_redundant_argument_values
